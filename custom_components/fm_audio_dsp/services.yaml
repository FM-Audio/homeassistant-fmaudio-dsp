send_preset:
  name: Send preset
  description: Load an FM-Audio DSP preset via Telnet.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional config entry ID. If omitted, all configured DSP entries receive the command.
      example: "01HZY..."
      selector:
        text:
    target_host:
      name: Target DSP host
      description: Optional DSP IP address within the selected entry. If omitted, every DSP host in the selected entry receives the command.
      example: "192.168.178.192"
      selector:
        text:
    preset:
      name: Preset
      description: Preset number to load.
      required: true
      example: 1
      selector:
        number:
          min: 1
          max: 100
          mode: box
send_command:
  name: Send command
  description: Send a preset or utility command to an FM-Audio DSP via Telnet.
  fields:
    entry_id:
      name: Config entry ID
      description: Optional config entry ID. If omitted, all configured DSP entries receive the command.
      selector:
        text:
    target_host:
      name: Target DSP host
      description: Optional DSP IP address within the selected entry. If omitted, every DSP host in the selected entry receives the command.
      example: "192.168.178.192"
      selector:
        text:
    command:
      name: Command
      description: Command to send, for example PRESET_1, STANDBY, WAKE, or LOCATE.
      required: true
      example: "STANDBY"
      selector:
        text:
